<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 深圳市英能聚科技有限公司</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">英能聚科技</div>
                <ul class="nav-menu">
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="../products/">产品中心</a></li>
                    <li><a href="../solutions/">解决方案</a></li>
                    <li><a href="../cases/">工程案例</a></li>
                    <li><a href="../about/">关于我们</a></li>
                    <li><a href="index.html" class="active">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 页头横幅 -->
    <section class="page-header">
        <div class="container">
            <h1>联系我们</h1>
            <p>Contact Us</p>
            <div class="breadcrumb">
                <a href="../index.html">首页</a> &gt; 联系我们
            </div>
        </div>
    </section>

    <!-- 联系方式 -->
    <section>
        <div class="container">
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-icon">👤</span>
                    <div><h4>联系人</h4><p>坦克手</p></div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📧</span>
                    <div><h4>邮箱</h4><p>elgyc@elgyc.com</p></div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📍</span>
                    <div><h4>公司地址</h4><p>深圳市</p></div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">🕐</span>
                    <div><h4>工作时间</h4><p>周一至周五 9:00-18:00</p></div>
                </div>
            </div>

            <!-- 咨询表单 -->
            <div style="max-width: 600px; margin: 60px auto 0;">
                <div class="section-title">
                    <h2>在线咨询</h2>
                    <p>Online Consultation</p>
                </div>
                <form style="background: var(--bg-light); padding: 40px; border-radius: 10px;">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500;">您的姓名 *</label>
                        <input type="text" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500;">公司名称</label>
                        <input type="text" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500;">联系电话 *</label>
                        <input type="tel" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500;">邮箱地址 *</label>
                        <input type="email" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500;">咨询内容 *</label>
                        <textarea rows="5" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">提交咨询</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 深圳市英能聚科技有限公司 版权所有</p>
            <p>邮箱：elgyc@elgyc.com &nbsp;&nbsp;|&nbsp;&nbsp; 地址：深圳市</p>
        </div>
    </footer>
</body>
</html>
